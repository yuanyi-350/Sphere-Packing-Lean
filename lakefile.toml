name           = "SpherePacking"
defaultTargets = ["SpherePacking"]

[leanOptions]
pp.unicode.fun            = true
autoImplicit              = false
relaxedAutoImplicit       = false
linter.mathlibStandardSet = true
linter.style.longLine     = false # disabled because of long import lines
linter.style.longFile     = 1500

[[require]]
name = "mathlib"
git  = "https://github.com/leanprover-community/mathlib4"
rev  = "v4.29.0-rc6"

[[lean_lib]]
name = "SpherePacking"
